owner: Prosper-App
repo: status

sites:
  - name: Prosper API (Staging)
    url: https://stage.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper Admin (Staging)
    url: https://admin-stage.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper API (Production)
    url: https://api.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper Admin (Production)
    url: https://admin.prosper.codes
    expectedStatusCodes:
      - 200
      - 301
      - 302

status-website:
  cname: status.prosper.codes
  name: Prosper Status
  logoUrl: https://prosper.love/favicon.ico
  theme: light
  navbar:
    - title: Status
      href: /
  css: |
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --color-primary: #0055fe;
      --color-secondary: #4f1ad6;
    }
    body {
      font-family: var(--font-family) !important;
    }
    * {
      font-family: var(--font-family) !important;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-family) !important;
    }
    .status-up, .tag.is-success {
      background-color: #dbfcbd !important;
      color: #1a5c00 !important;
    }
    a {
      color: #0055fe;
    }
    a:hover {
      color: #4f1ad6;
    }
    .navbar-brand .navbar-item {
      font-weight: 700;
    }
    footer, .footer {
      display: none !important;
    }

workflowSchedule:
  uptime: "*/5 * * * *"
  responseTime: "0 23 * * *"
  graphs: "0 0 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"

commitMessages:
  readmeContent: "Update summary in README [skip ci]"
  summaryJson: "Update status summary [skip ci]"
  statusChange: "$SITE_NAME is $STATUS"
  graphsUpdate: "Update graphs [skip ci]"
  commitAuthorName: "Upptime Bot"
  commitAuthorEmail: "upptime@prosper.codes"
