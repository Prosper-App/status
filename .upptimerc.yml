owner: Prosper-App
repo: status

sites:
  - name: Prosper API (Staging)
    url: https://stage.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper Admin (Staging)
    url: https://admin-stage.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper API (Production)
    url: https://api.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper Admin (Production)
    url: https://admin.prosper.codes
    expectedStatusCodes:
      - 200
      - 301
      - 302

status-website:
  cname: status.prosper.codes
  name: Prosper Status
  theme: night
  navbar:
    - title: Status
      href: /
  css: |
    :root {
      --body-background-color: #000000 !important;
      --body-text-color: #e0e0e0 !important;
      --card-background-color: #111111 !important;
      --nav-background-color: #000000 !important;
      --nav-border-bottom-color: rgba(255,255,255,0.08) !important;
      --nav-current-border-bottom-color: #ffffff !important;
      --card-border-color: rgba(255,255,255,0.06) !important;
      --up-border-left-color: rgba(255,255,255,0.2) !important;
      --tag-up-background-color: rgba(255,255,255,0.1) !important;
      --tag-down-background-color: rgba(255,76,76,0.15) !important;
      --graph-opacity: 0.8 !important;
    }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body, *, h1, h2, h3, h4, h5, h6, p, a, span, div, li, td, th, label, input, select, button, .title, .subtitle, .content, .navbar-item, .card-content, .card-content * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
    }
    body {
      background: #000000 !important;
      color: #e0e0e0 !important;
    }
    .navbar, nav {
      background: #000000 !important;
      border-bottom: 1px solid rgba(255,255,255,0.08) !important;
    }
    .navbar-brand .navbar-item, .navbar .navbar-item {
      color: #ffffff !important;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .section, .container, .hero, .hero-body {
      background: #000000 !important;
    }
    .card, .box, article {
      background: #111111 !important;
      border: 1px solid rgba(255,255,255,0.06) !important;
      border-radius: 16px !important;
    }
    .card-content, .card-content *, .box, .box * {
      color: #e0e0e0 !important;
    }
    h1, h2, h3, h4, .title, .hero-body .title, .hero-body .subtitle {
      color: #ffffff !important;
      font-weight: 600 !important;
    }
    p, .subtitle, .content, span {
      color: rgba(255,255,255,0.7) !important;
    }
    a, a:visited {
      color: #ffffff !important;
      text-decoration: none !important;
    }
    a:hover {
      color: rgba(255,255,255,0.6) !important;
    }
    .tag.is-success, .status-up, .is-success {
      background: rgba(255,255,255,0.1) !important;
      color: #ffffff !important;
    }
    .tag.is-danger, .status-down, .is-danger {
      background: rgba(255,76,76,0.15) !important;
      color: #ff6b6b !important;
    }
    .tag {
      border-radius: 20px !important;
      font-weight: 500 !important;
    }
    table, .table {
      background: transparent !important;
      color: #e0e0e0 !important;
    }
    table th, table td, .table th, .table td {
      background: transparent !important;
      color: #e0e0e0 !important;
      border-color: rgba(255,255,255,0.06) !important;
    }
    table thead th {
      color: #ffffff !important;
      font-weight: 600 !important;
    }
    footer, .footer {
      display: none !important;
    }
    input, select, .input, .select select {
      background: #111111 !important;
      color: #e0e0e0 !important;
      border-color: rgba(255,255,255,0.1) !important;
      border-radius: 8px !important;
    }
    ::selection {
      background: rgba(255,255,255,0.2);
    }

workflowSchedule:
  uptime: "*/5 * * * *"
  responseTime: "0 23 * * *"
  graphs: "0 0 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"

commitMessages:
  readmeContent: "Update summary in README [skip ci]"
  summaryJson: "Update status summary [skip ci]"
  statusChange: "$PREFIX $SITE_NAME is $STATUS ($RESPONSE_CODE in $RESPONSE_TIME ms)"
  graphsUpdate: "Update graphs [skip ci]"
  commitAuthorName: "Upptime Bot"
  commitAuthorEmail: "upptime@prosper.codes"
