owner: Prosper-App
repo: status

sites:
  - name: Prosper API (Staging)
    url: https://stage.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper Admin (Staging)
    url: https://admin-stage.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper API (Production)
    url: https://api.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper Admin (Production)
    url: https://admin.prosper.codes
    expectedStatusCodes:
      - 200
      - 301
      - 302

status-website:
  cname: status.prosper.codes
  name: Prosper Status
  theme: night
  navbar:
    - title: Status
      href: /
  css: |
    :root {
      --body-background-color: #000000 !important;
      --body-text-color: #e0e0e0 !important;
      --card-background-color: #111111 !important;
      --nav-background-color: #000000 !important;
      --nav-border-bottom-color: rgba(255,255,255,0.08) !important;
      --nav-current-border-bottom-color: #ffffff !important;
      --card-border-color: rgba(255,255,255,0.06) !important;
      --up-border-left-color: rgba(255,255,255,0.15) !important;
      --tag-up-background-color: rgba(255,255,255,0.08) !important;
      --tag-down-background-color: rgba(255,76,76,0.12) !important;
      --graph-opacity: 0.85 !important;
    }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    }
    body {
      background: #000000 !important;
      color: #e0e0e0 !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .navbar, nav {
      background: #000000 !important;
      border-bottom: 1px solid rgba(255,255,255,0.06) !important;
      padding: 0.5rem 0 !important;
    }
    .navbar-brand .navbar-item, .navbar .navbar-item {
      color: #ffffff !important;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.8rem !important;
    }
    .section, .container, .hero, .hero-body {
      background: #000000 !important;
    }
    .hero-body {
      padding-top: 3rem !important;
      padding-bottom: 1rem !important;
    }
    h1, .hero-body .title {
      color: #ffffff !important;
      font-weight: 700 !important;
      font-size: 2.5rem !important;
      letter-spacing: -0.03em !important;
    }
    h2, h3, h4, .title {
      color: #ffffff !important;
      font-weight: 600 !important;
      letter-spacing: -0.02em !important;
    }
    .hero-body .subtitle {
      color: rgba(255,255,255,0.5) !important;
      font-weight: 400 !important;
      font-size: 1.1rem !important;
    }
    p, .subtitle, .content {
      color: rgba(255,255,255,0.6) !important;
    }
    a, a:visited {
      color: #ffffff !important;
      text-decoration: none !important;
    }
    a:hover {
      color: rgba(255,255,255,0.7) !important;
    }
    .tag.is-success, .status-up, .is-success {
      background: rgba(255,255,255,0.06) !important;
      color: rgba(255,255,255,0.9) !important;
      font-size: 0.75rem !important;
      font-weight: 500 !important;
    }
    .tag.is-danger, .status-down, .is-danger {
      background: rgba(255,76,76,0.1) !important;
      color: #ff6b6b !important;
      font-size: 0.75rem !important;
      font-weight: 500 !important;
    }
    .tag {
      border-radius: 6px !important;
      font-weight: 500 !important;
      padding: 0.4em 0.8em !important;
      letter-spacing: 0.02em !important;
    }
    table, .table {
      background: transparent !important;
      color: #e0e0e0 !important;
    }
    table th, table td, .table th, .table td {
      background: transparent !important;
      color: rgba(255,255,255,0.7) !important;
      border-color: rgba(255,255,255,0.04) !important;
      padding: 1rem 0.75rem !important;
    }
    table thead th {
      color: rgba(255,255,255,0.4) !important;
      font-weight: 500 !important;
      font-size: 0.75rem !important;
      text-transform: uppercase !important;
      letter-spacing: 0.06em !important;
    }
    footer, .footer {
      display: none !important;
    }
    input, select, .input, .select select {
      background: #0a0a0a !important;
      color: #e0e0e0 !important;
      border-color: rgba(255,255,255,0.08) !important;
      border-radius: 8px !important;
    }
    input:focus, select:focus, .input:focus {
      border-color: rgba(255,255,255,0.2) !important;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.05) !important;
    }
    ::selection {
      background: rgba(255,255,255,0.15);
    }
    .column {
      padding: 0.5rem !important;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 10px;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.65rem;
      font-weight: 500;
      vertical-align: middle;
    }
    .badge-up {
      background: rgba(34,197,94,0.12);
      color: #4ade80;
    }
    .badge-down {
      background: rgba(239,68,68,0.12);
      color: #f87171;
    }
    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      display: inline-block;
    }
    .badge-up .badge-dot { background: #22c55e; }
    .badge-down .badge-dot { background: #ef4444; }
    .live-status {
      display: grid !important;
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 12px !important;
      align-items: stretch !important;
    }
    .live-status article.link {
      padding: 16px 20px !important;
      border-radius: 12px !important;
      background: #111 !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      height: 100% !important;
      margin-top: 0 !important;
      box-sizing: border-box !important;
    }
    article.link:hover {
      border-color: rgba(255,255,255,0.14) !important;
    }
    article.link h4 {
      font-size: 0.85rem !important;
      margin-bottom: 6px !important;
    }
    article.link h4 .icon {
      width: 16px !important;
      height: 16px !important;
      margin-right: 6px !important;
    }
    article.link div {
      font-size: 0.78rem !important;
      line-height: 1.5 !important;
    }
    .uptime-bar {
      display: flex;
      gap: 2px;
      margin-top: 12px;
      height: 20px;
      border-radius: 4px;
      overflow: hidden;
    }
    .uptime-bar .bar-seg {
      flex: 1;
      border-radius: 2px;
      min-width: 3px;
      transition: opacity 0.2s;
    }
    .uptime-bar .bar-seg.up {
      background: #22c55e;
      opacity: 0.5;
    }
    .uptime-bar .bar-seg.up:hover { opacity: 1; }
    .uptime-bar .bar-seg.down {
      background: #ef4444;
      opacity: 0.8;
    }
    .uptime-bar .bar-seg.down:hover { opacity: 1; }
    .uptime-bar .bar-seg.unknown {
      background: rgba(255,255,255,0.06);
    }
    .bar-label {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.25);
    }
    .nav-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      font-size: 0.7rem;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.02em;
    }
    .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,0.5);
    }
    .nav-dot.down {
      background: #ef4444;
      box-shadow: 0 0 6px rgba(239,68,68,0.5);
    }
    @media (max-width: 700px) {
      .live-status { grid-template-columns: 1fr !important; }
    }
    .fallback-container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
    .fallback-header { text-align: center; margin-bottom: 2.5rem; }
    .fallback-header h1 { font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 0.25rem; }
    .fallback-header p { color: rgba(255,255,255,0.4); font-size: 0.9rem; }
    .fallback-summary { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 0.5rem 1rem; margin-bottom: 2rem; }
    .fallback-dot { width: 8px; height: 8px; border-radius: 50%; }
    .fallback-dot.up { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.4); }
    .fallback-dot.down { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.4); }
    .fallback-summary span { font-size: 0.85rem; color: rgba(255,255,255,0.7); }
    .fb-card { background: #111; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .fb-card:hover { border-color: rgba(255,255,255,0.14); }
    .fb-left { display: flex; align-items: center; gap: 1rem; min-width: 0; }
    .fb-icon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; }
    .fb-name { font-weight: 500; color: #fff; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fb-right { display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
    .fb-meta { text-align: right; font-size: 0.8rem; color: rgba(255,255,255,0.4); line-height: 1.4; }
    .fb-status { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.75rem; font-weight: 500; }
    .fb-status.up { background: rgba(34,197,94,0.1); color: #4ade80; }
    .fb-status.down { background: rgba(239,68,68,0.1); color: #f87171; }
    .fb-status .dot { width: 6px; height: 6px; border-radius: 50%; }
    .fb-status.up .dot { background: #22c55e; }
    .fb-status.down .dot { background: #ef4444; }
    @media (max-width: 480px) { .fb-card { flex-direction: column; align-items: flex-start; } .fb-right { flex-direction: row; width: 100%; justify-content: space-between; } }
    .detail-container { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
    .detail-back { display: inline-flex; align-items: center; gap: 4px; font-size: 0.8rem; color: rgba(255,255,255,0.4) !important; margin-bottom: 1.5rem; transition: color 0.2s; }
    .detail-back:hover { color: rgba(255,255,255,0.7) !important; }
    .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
    .detail-icon { width: 28px; height: 28px; border-radius: 6px; }
    .detail-title { font-size: 1.4rem !important; font-weight: 600 !important; color: #fff !important; margin: 0 !important; letter-spacing: -0.02em !important; }
    .detail-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 2rem; }
    .stat-card { background: #111; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-value { font-size: 1.3rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.04em; }
    .detail-section { margin-bottom: 2rem; }
    .detail-section-title { font-size: 0.75rem !important; font-weight: 500 !important; color: rgba(255,255,255,0.4) !important; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px !important; }
    .graph-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
    .graph-tab { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border-radius: 6px; padding: 5px 12px; font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .graph-tab:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }
    .graph-tab.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.15); }
    .detail-graph { width: 100%; border-radius: 10px; background: #111; border: 1px solid rgba(255,255,255,0.08); padding: 8px; }
    @media (max-width: 600px) { .detail-stats { grid-template-columns: repeat(2, 1fr); } }
  js: |
    (function(){
      var OWNER='Prosper-App',REPO='status';
      var RAW='https://raw.githubusercontent.com/'+OWNER+'/'+REPO+'/main';
      var CACHE_TTL=300000;
      var origFetch=window.fetch;

      /* --- GitHub API fetch cache (localStorage, 5min TTL, stale on 403/429) --- */
      window.fetch=function(url,opts){
        if(typeof url==='string'&&url.indexOf('api.github.com')!==-1){
          var ck='gh_cache_'+url;var c=localStorage.getItem(ck);
          if(c){try{var d=JSON.parse(c);if(Date.now()-d.ts<CACHE_TTL)return Promise.resolve(new Response(JSON.stringify(d.body),{status:200,headers:{'Content-Type':'application/json'}}));}catch(e){}}
          return origFetch.call(window,url,opts).then(function(r){
            if(r.ok){var cl=r.clone();cl.json().then(function(j){try{localStorage.setItem(ck,JSON.stringify({ts:Date.now(),body:j}));}catch(e){}});}
            if((r.status===403||r.status===429)&&c){try{var s=JSON.parse(c);return new Response(JSON.stringify(s.body),{status:200,headers:{'Content-Type':'application/json'}});}catch(e){}}
            return r;
          }).catch(function(err){if(c){try{var s=JSON.parse(c);return new Response(JSON.stringify(s.body),{status:200,headers:{'Content-Type':'application/json'}});}catch(e){}}throw err;});
        }
        return origFetch.call(window,url,opts);
      };

      function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt)e.textContent=txt;return e;}

      /* --- Build uptime bar from dailyMinutesDown data --- */
      function buildUptimeBar(dailyDown){
        var bar=el('div','uptime-bar');
        var now=new Date();
        for(var i=29;i>=0;i--){
          var d=new Date(now);d.setDate(d.getDate()-i);
          var key=d.toISOString().split('T')[0];
          var mins=dailyDown&&dailyDown[key]?dailyDown[key]:0;
          var cls=mins>0?'down':'up';
          var seg=el('div','bar-seg '+cls);
          if(mins>0)seg.title=key+': '+mins+' min down';
          else seg.title=key+': operational';
          bar.appendChild(seg);
        }
        return bar;
      }

      /* --- Inject badges, uptime bars, move banner to nav, hide empties --- */
      var summaryData=null;
      function enhance(){
        /* Detail page */
        enhanceDetail();

        /* Badges on article.link cards */
        document.querySelectorAll('article.link').forEach(function(a){
          if(a.dataset.enh)return;a.dataset.enh='1';
          var h4=a.querySelector('h4');if(!h4)return;

          /* Find matching site data for real status */
          var linkEl=a.querySelector('h4 a');
          var siteName=linkEl?linkEl.textContent.trim():'';
          var siteData=summaryData?summaryData.find(function(s){return s.name===siteName;}):null;
          var isUp=siteData?siteData.status==='up':a.classList.contains('up');
          var badge=el('span','status-badge '+(isUp?'badge-up':'badge-down'));
          badge.appendChild(el('span','badge-dot'));
          badge.appendChild(document.createTextNode(isUp?'Operational':'Down'));
          h4.appendChild(badge);
          var bar=buildUptimeBar(siteData?siteData.dailyMinutesDown:null);
          a.appendChild(bar);
          var lbl=el('div','bar-label');
          lbl.appendChild(el('span',null,'30 days ago'));
          lbl.appendChild(el('span',null,'Today'));
          a.appendChild(lbl);
        });

        /* Move banner into nav */
        var banner=document.querySelector('article.up:not(.link)')||document.querySelector('article:not(.link)');
        if(banner&&!document.querySelector('.nav-status')){
          var navC=document.querySelector('nav .container')||document.querySelector('nav');
          if(navC){
            var allUp=summaryData?summaryData.every(function(s){return s.status==='up';}):!document.querySelector('article.link.down');
            var ns=el('div','nav-status');
            ns.appendChild(el('div','nav-dot'+(allUp?'':' down')));
            ns.appendChild(document.createTextNode(allUp?'All systems operational':'Some systems down'));
            navC.appendChild(ns);
          }
          banner.style.display='none';
        }

        /* Hide empty header & sections */
        var hero=document.querySelector('.hero-body');
        if(hero)hero.style.display='none';
        document.querySelectorAll('section').forEach(function(s){
          if(!s.classList.contains('live-status')&&s.querySelectorAll('article').length===0){
            s.style.display='none';
          }
        });

        /* Detail page: tag labels */
        document.querySelectorAll('.tag.is-success').forEach(function(t){if(!t.dataset.lb){t.textContent='Operational';t.dataset.lb='1';}});
        document.querySelectorAll('.tag.is-danger').forEach(function(t){if(!t.dataset.lb){t.textContent='Down';t.dataset.lb='1';}});
      }

      /* --- Detail page enhancement --- */
      function enhanceDetail(){
        var path=window.location.pathname;
        if(path.indexOf('/history/')===- 1)return;
        if(document.querySelector('.detail-container'))return;
        var slug=path.replace('/history/','').replace(/\/$/,'');
        if(!slug)return;
        /* Fetch both summary.json (stats) and live history yml (current status) */
        Promise.all([
          origFetch(RAW+'/history/summary.json').then(function(r){return r.json();}),
          origFetch(RAW+'/history/'+slug+'.yml').then(function(r){return r.text();}).catch(function(){return '';})
        ]).then(function(results){
          var sites=results[0];var ymlText=results[1];
          /* Parse live status from yml */
          var liveStatus=null;
          if(ymlText){
            var m=ymlText.match(/status:\s*(\w+)/);
            if(m)liveStatus=m[1];
          }
          var site=sites.find(function(s){return s.slug===slug;});
          if(!site)return;
          /* Override status with live data if available */
          if(liveStatus)site.status=liveStatus;
          var main=document.querySelector('main');
          if(!main)return;
          while(main.firstChild)main.removeChild(main.firstChild);
          var wrap=el('div','detail-container');
          var back=el('a','detail-back','\u2190 All services');
          back.href='/';
          back.addEventListener('click',function(e){e.preventDefault();window.location.href='/';});
          wrap.appendChild(back);
          var hdr=el('div','detail-header');
          var icon=document.createElement('img');icon.className='detail-icon';icon.src=site.icon;icon.alt='';
          hdr.appendChild(icon);
          var title=el('h1','detail-title',site.name);
          var isUp=site.status==='up';
          var badge=el('span','status-badge '+(isUp?'badge-up':'badge-down'));
          badge.appendChild(el('span','badge-dot'));
          badge.appendChild(document.createTextNode(isUp?'Operational':'Down'));
          title.appendChild(badge);
          hdr.appendChild(title);
          wrap.appendChild(hdr);
          var stats=el('div','detail-stats');
          [{l:'Uptime (24h)',v:site.uptimeDay},{l:'Uptime (7d)',v:site.uptimeWeek},{l:'Uptime (30d)',v:site.uptimeMonth},{l:'Avg Response',v:site.time+'ms'}].forEach(function(s){
            var card=el('div','stat-card');
            card.appendChild(el('div','stat-value',s.v));
            card.appendChild(el('div','stat-label',s.l));
            stats.appendChild(card);
          });
          wrap.appendChild(stats);
          var barSec=el('div','detail-section');
          barSec.appendChild(el('h2','detail-section-title','Uptime (30 days)'));
          var bar=buildUptimeBar(site.dailyMinutesDown);
          barSec.appendChild(bar);
          var lbl=el('div','bar-label');
          lbl.appendChild(el('span',null,'30 days ago'));
          lbl.appendChild(el('span',null,'Today'));
          barSec.appendChild(lbl);
          wrap.appendChild(barSec);
          var gSec=el('div','detail-section');
          gSec.appendChild(el('h2','detail-section-title','Response Time'));
          var tabs=el('div','graph-tabs');
          var gImg=document.createElement('img');
          gImg.className='detail-graph';
          gImg.src=RAW+'/graphs/'+slug+'/response-time-week.png';
          gImg.alt='Response time';
          [{k:'day',l:'24h'},{k:'week',l:'7d'},{k:'month',l:'30d'},{k:'year',l:'1y'}].forEach(function(p){
            var tab=el('button','graph-tab'+(p.k==='week'?' active':''),p.l);
            tab.addEventListener('click',function(){
              tabs.querySelectorAll('.graph-tab').forEach(function(t){t.classList.remove('active');});
              tab.classList.add('active');
              gImg.src=RAW+'/graphs/'+slug+'/response-time-'+p.k+'.png';
            });
            tabs.appendChild(tab);
          });
          gSec.appendChild(tabs);
          gSec.appendChild(gImg);
          wrap.appendChild(gSec);
          main.appendChild(wrap);
        }).catch(function(){});
      }

      /* --- Load summary data, then start observer --- */
      function startObserver(){
        function observe(){
          new MutationObserver(function(){enhance();}).observe(document.body,{childList:true,subtree:true});
          enhance();
        }
        origFetch(RAW+'/history/summary.json').then(function(r){return r.json();}).then(function(d){summaryData=d;}).catch(function(){}).then(function(){
          if(document.body){observe();}
          else{document.addEventListener('DOMContentLoaded',observe);}
        });
      }
      startObserver();

      /* --- Fallback renderer (if rate-limited / loading stuck >3s) --- */
      function renderFallback(){
        if(!document.querySelectorAll('.loading').length)return;
        origFetch(RAW+'/history/summary.json').then(function(r){return r.json();}).then(function(sites){
          var main=document.querySelector('main');if(!main)return;
          while(main.firstChild)main.removeChild(main.firstChild);
          var wrap=el('div','fallback-container');
          var hdr=el('div','fallback-header');
          hdr.appendChild(el('h1',null,'Prosper Status'));
          var allUp=sites.every(function(s){return s.status==='up';});
          var sum=el('div','fallback-summary');
          sum.appendChild(el('div','fallback-dot '+(allUp?'up':'down')));
          sum.appendChild(el('span',null,allUp?'All systems operational':'Some systems experiencing issues'));
          hdr.appendChild(sum);
          wrap.appendChild(hdr);
          sites.forEach(function(s){
            var card=el('div','fb-card');
            var left=el('div','fb-left');
            var icon=document.createElement('img');icon.className='fb-icon';icon.src=s.icon;icon.alt='';
            left.appendChild(icon);left.appendChild(el('span','fb-name',s.name));
            card.appendChild(left);
            var right=el('div','fb-right');
            var meta=el('div','fb-meta');
            meta.appendChild(el('div',null,s.uptime+' uptime'));
            meta.appendChild(el('div',null,s.time+' ms'));
            right.appendChild(meta);
            var isUp=s.status==='up';
            var fbBadge=el('div','fb-status '+(isUp?'up':'down'));
            fbBadge.appendChild(el('div','dot'));
            fbBadge.appendChild(document.createTextNode(isUp?'Operational':'Down'));
            right.appendChild(fbBadge);
            card.appendChild(right);wrap.appendChild(card);
          });
          main.appendChild(wrap);
        }).catch(function(){});
      }
      function scheduleFallback(){setTimeout(function(){if(document.querySelectorAll('.loading').length>0)renderFallback();},3000);}
      if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',scheduleFallback);}else{scheduleFallback();}

      /* Redirect rate-limit page */
      if(window.location.pathname.indexOf('rate-limit')!==-1)window.location.href='/';
    })();

