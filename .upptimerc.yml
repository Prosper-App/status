owner: Prosper-App
repo: status

sites:
  - name: Prosper API (Staging)
    url: https://stage.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper Admin (Staging)
    url: https://admin-stage.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper API (Production)
    url: https://api.prosper.codes/health
    expectedStatusCodes:
      - 200
  - name: Prosper Admin (Production)
    url: https://admin.prosper.codes
    expectedStatusCodes:
      - 200
      - 301
      - 302

status-website:
  cname: status.prosper.codes
  name: Prosper Status
  logoUrl: https://prosper.love/favicon.ico
  theme: dark
  navbar:
    - title: Status
      href: /
  css: |
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body, * , h1, h2, h3, h4, h5, h6 {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
    }
    body {
      background-color: #0c0712 !important;
      color: #d5dbe6 !important;
    }
    .navbar {
      background-color: #0c0712 !important;
      border-bottom: 1px solid #ffffff12;
    }
    .navbar-brand .navbar-item {
      color: #ffffff !important;
      font-weight: 700;
    }
    .section, .container {
      background-color: transparent !important;
    }
    .card, .box {
      background-color: #1a1025 !important;
      border: 1px solid #ffffff12;
      border-radius: 12px;
    }
    .card-content, .box * {
      color: #d5dbe6 !important;
    }
    h1, h2, h3, .title {
      color: #ffffff !important;
    }
    p, .subtitle, .content {
      color: #d5dbe6 !important;
    }
    a {
      color: #6e96fb !important;
    }
    a:hover {
      color: #0055fe !important;
    }
    .tag.is-success, .status-up {
      background-color: #1a3a1a !important;
      color: #dbfcbd !important;
    }
    .tag.is-danger, .status-down {
      background-color: #3a1a1a !important;
      color: #ffb399 !important;
    }
    .tag {
      border-radius: 8px;
    }
    table, .table {
      background-color: transparent !important;
      color: #d5dbe6 !important;
    }
    table th, table td, .table th, .table td {
      background-color: transparent !important;
      color: #d5dbe6 !important;
      border-color: #ffffff12 !important;
    }
    table thead th {
      color: #ffffff !important;
    }
    footer, .footer {
      display: none !important;
    }
    .hero {
      background-color: #0c0712 !important;
    }
    .hero-body .title, .hero-body .subtitle {
      color: #ffffff !important;
    }
    input, select, .input, .select select {
      background-color: #1a1025 !important;
      color: #d5dbe6 !important;
      border-color: #ffffff1a !important;
    }

workflowSchedule:
  uptime: "*/5 * * * *"
  responseTime: "0 23 * * *"
  graphs: "0 0 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"

commitMessages:
  readmeContent: "Update summary in README [skip ci]"
  summaryJson: "Update status summary [skip ci]"
  statusChange: "$EMOJI $SITE_NAME is $STATUS ($CODE in $RESPONSE_TIME ms)"
  graphsUpdate: "Update graphs [skip ci]"
  commitAuthorName: "Upptime Bot"
  commitAuthorEmail: "upptime@prosper.codes"
